<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0C0B0A; color: #F0E6CC; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .app { max-width: 820px; margin: 0 auto; padding: 44px 24px 80px; }

    /* Masthead */
    .mast { text-align: center; padding-bottom: 28px; border-bottom: 1px solid #2A2420; margin-bottom: 36px; }
    .mast-eye { font-size: 10px; letter-spacing: .35em; text-transform: uppercase; color: #C8923A; margin-bottom: 12px; font-weight: 500; }
    .mast-day { font-family: 'Playfair Display', serif; font-size: clamp(34px, 7vw, 58px); font-weight: 700; color: #F0E6CC; line-height: 1; }
    .mast-date { font-family: 'Playfair Display', serif; font-size: clamp(13px, 2vw, 17px); font-style: italic; color: #5A504A; margin-top: 6px; }
    .mast-rule { display: flex; align-items: center; gap: 12px; margin-top: 22px; }
    .mast-rule hr { flex: 1; border: none; border-top: 1px solid #2A2420; }
    .mast-rule span { font-size: 9px; letter-spacing: .25em; color: #3A3028; text-transform: uppercase; white-space: nowrap; }

    /* States */
    .state { display: none; }
    .state.active { display: block; }

    /* Idle */
    .idle-wrap { max-width: 460px; margin: 0 auto; text-align: center; }
    .idle-desc { font-size: 14px; color: #5A504A; line-height: 1.8; margin-bottom: 28px; }
    .field-label { display: block; font-size: 9px; letter-spacing: .25em; text-transform: uppercase; color: #5A504A; margin-bottom: 10px; text-align: left; }
    textarea { width: 100%; background: #141210; border: 1px solid #2A2420; color: #F0E6CC; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 14px 16px; resize: vertical; min-height: 90px; outline: none; line-height: 1.6; transition: border .2s; margin-bottom: 20px; }
    textarea:focus { border-color: #C8923A55; }
    textarea::placeholder { color: #3A3028; }

    /* Buttons */
    .btn { display: block; width: 100%; padding: 14px; background: #C8923A; color: #0C0B0A; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: .06em; cursor: pointer; transition: background .2s, transform .15s; }
    .btn:hover { background: #D9A34A; transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-sm { width: auto; padding: 10px 28px; background: transparent; color: #5A504A; border: 1px solid #2A2420; font-size: 13px; margin: 32px auto 0; display: block; }
    .btn-sm:hover { border-color: #C8923A; color: #C8923A; }

    /* Loading */
    .loading-wrap { text-align: center; padding: 64px 0; }
    .bar { width: 180px; height: 1px; background: #2A2420; margin: 0 auto 24px; position: relative; overflow: hidden; }
    .bar::after { content: ''; position: absolute; top: 0; left: -40%; width: 40%; height: 100%; background: #C8923A; animation: sw 1.4s ease-in-out infinite; }
    @keyframes sw { 0% { left: -40%; } 100% { left: 100%; } }
    .loading-msg { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: #C8923A; }

    /* Error */
    .err-box { border: 1px solid #6B2A2A44; background: #1A0E0E; padding: 20px; text-align: center; margin-bottom: 20px; }
    .err-box p { color: #B85A4A; font-size: 14px; margin-bottom: 6px; }
    .err-box code { font-size: 11px; color: #7A4A4A; font-family: monospace; word-break: break-all; }

    /* Briefing */
    .greeting { font-family: 'Playfair Display', serif; font-size: clamp(16px, 2.5vw, 21px); font-style: italic; color: #F0E6CC; line-height: 1.55; text-align: center; padding: 24px 28px; border: 1px solid #C8923A33; background: #12100E; margin-bottom: 22px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .card { background: #141210; border: 1px solid #2A2420; padding: 22px; }
    .card.gold { border-color: #C8923A44; }
    .card.full { grid-column: 1 / -1; }
    .card-head { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid #2A2420; margin-bottom: 14px; }
    .card-lbl { font-size: 9px; letter-spacing: .3em; text-transform: uppercase; color: #5A504A; font-weight: 500; }

    .task-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2A242018; font-size: 14px; color: #D8CEBC; line-height: 1.4; }
    .task-row:last-child { border-bottom: none; }
    .dot { color: #5B8A6A; flex-shrink: 0; margin-top: 2px; }

    .stories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0 28px; }
    .story { padding: 10px 0; border-bottom: 1px solid #2A242018; }
    .story:last-child { border-bottom: none; }
    .story-title { font-size: 13px; font-weight: 500; color: #D8CEBC; margin-bottom: 4px; line-height: 1.4; }
    .story-sum { font-size: 12px; color: #5A504A; line-height: 1.6; }

    .focus-text { font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; color: #F0E6CC; line-height: 1.7; }
    .muted { color: #5A504A; font-size: 13px; font-style: italic; }
    .footer { text-align: center; margin-top: 36px; padding-top: 22px; border-top: 1px solid #2A2420; }

    @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } .app { padding: 28px 16px 60px; } }
  </style>
</head>
<body>
<div class="app">

  <!-- Masthead -->
  <div class="mast">
    <div class="mast-eye">☀ &nbsp; Morning Brief</div>
    <div class="mast-day" id="mast-day"></div>
    <div class="mast-date" id="mast-date"></div>
    <div class="mast-rule"><hr><span>Andy's Daily Briefing</span><hr></div>
  </div>

  <!-- IDLE -->
  <div id="idle" class="state active">
    <div class="idle-wrap">
      <p class="idle-desc">Your personal morning briefing. Add your tasks and Claude will find the latest from Indie Hackers and tell you what to focus on first.</p>
      <label class="field-label">What's on your plate today?</label>
      <textarea id="tasks-input" placeholder="e.g. Finish the landing page, set up GitHub repo, look into Stripe..."></textarea>
      <div id="idle-error" class="err-box" style="display:none">
        <p>Couldn't generate — try again.</p>
        <code id="idle-error-msg"></code>
      </div>
      <button class="btn" onclick="generate()">Generate Today's Briefing</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="state">
    <div class="loading-wrap">
      <div class="bar"></div>
      <div class="loading-msg" id="loading-msg">Searching Indie Hackers...</div>
    </div>
  </div>

  <!-- BRIEFING -->
  <div id="briefing" class="state">
    <div class="greeting" id="b-greeting"></div>
    <div class="grid">
      <div class="card">
        <div class="card-head"><span>✅</span><span class="card-lbl">Today's Tasks</span></div>
        <div id="b-tasks"></div>
      </div>
      <div class="card gold">
        <div class="card-head"><span>🎯</span><span class="card-lbl">Today's Focus</span></div>
        <div class="focus-text" id="b-focus"></div>
      </div>
      <div class="card full">
        <div class="card-head"><span>📰</span><span class="card-lbl">Indie Hackers Today</span></div>
        <div class="stories-grid" id="b-stories"></div>
      </div>
    </div>
    <div class="footer">
      <button class="btn btn-sm" onclick="reset()">Start Over</button>
    </div>
  </div>

</div>

<script>
  // Set today's date
  const today = new Date();
  const dayName = today.toLocaleDateString('en-GB', { weekday: 'long' });
  const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('mast-day').textContent = dayName;
  document.getElementById('mast-date').textContent = dateStr;

  const STEPS = [
    'Searching Indie Hackers...',
    'Reading the founder community...',
    'Crafting your focus suggestion...',
    'Writing your briefing...'
  ];
  let stepTimer;

  function show(id) {
    ['idle', 'loading', 'briefing'].forEach(s => {
      document.getElementById(s).classList.toggle('active', s === id);
    });
  }

  function reset() { show('idle'); }

  function render(data) {
    document.getElementById('b-greeting').textContent = '"' + data.greeting + '"';

    const tasksEl = document.getElementById('b-tasks');
    tasksEl.innerHTML = (!data.tasks || !data.tasks.length)
      ? '<p class="muted">Nothing noted — a good day to get ahead.</p>'
      : data.tasks.map(t => '<div class="task-row"><span class="dot">◆</span><span>' + t + '</span></div>').join('');

    document.getElementById('b-focus').textContent = data.focus;

    const storiesEl = document.getElementById('b-stories');
    storiesEl.innerHTML = (!data.stories || !data.stories.length)
      ? '<p class="muted">No stories found today.</p>'
      : data.stories.map(s =>
          '<div class="story"><div class="story-title">' + s.title + '</div><div class="story-sum">' + s.summary + '</div></div>'
        ).join('');

    show('briefing');
  }

  async function generate() {
    const tasks = document.getElementById('tasks-input').value.trim();
    document.getElementById('idle-error').style.display = 'none';
    show('loading');

    let i = 0;
    document.getElementById('loading-msg').textContent = STEPS[0];
    stepTimer = setInterval(() => {
      i = (i + 1) % STEPS.length;
      document.getElementById('loading-msg').textContent = STEPS[i];
    }, 2200);

    const prompt = `Generate Andy's morning briefing for ${dayName}, ${dateStr}.

Andy lives in Purley, South London. He has a 9-5 job and builds apps as side projects. He wants to be an entrepreneur.

His tasks for today: ${tasks || 'Nothing specific yet — suggest 2-3 useful tasks for a beginner developer building side projects'}

Search indiehackers.com for the 3 most recent stories.

Return ONLY valid JSON — no markdown, no code fences, no explanation:
{
  "greeting": "A sharp personal one-sentence morning greeting for Andy that mentions ${dayName}",
  "tasks": ["each task written cleanly"],
  "stories": [{"title": "story headline", "summary": "2 sentences: what they built and the single most useful lesson for a solo founder"}],
  "focus": "The one specific thing Andy should do first today and exactly why. 2 sentences. Be direct and concrete."
}`;

    try {
      // NOTE: We call /generate on our own server, NOT the Anthropic API directly.
      // Our server (server.js) holds the API key and forwards the request safely.
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }],
          tools: [{ type: 'web_search_20250305', name: 'web_search' }]
        })
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error?.message || 'HTTP ' + res.status);
      }

      const data = await res.json();

      // Check if the API returned an error
      if (data.error) {
        throw new Error(data.error.message || 'API returned an error');
      }

      // Check content exists
      if (!data.content) {
        throw new Error('Unexpected response: ' + JSON.stringify(data));
      }

      const texts = data.content.filter(b => b.type === 'text');
      if (!texts.length) throw new Error('No text in response');

      const raw = texts[texts.length - 1].text;
      const clean = raw.replace(/```json\s*|\s*```/g, '').trim();
      const parsed = JSON.parse(clean);

      clearInterval(stepTimer);
      render(parsed);

    } catch (err) {
      clearInterval(stepTimer);
      show('idle');
      document.getElementById('idle-error').style.display = 'block';
      document.getElementById('idle-error-msg').textContent = err.message;
    }
  }
</script>
</body>
</html>
